<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Birthday Countdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            background-image: url('your-bg-image.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f5f5dc; 
            color: #2c2c2c; 
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; 
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out; 
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -63vh; 
            width: 100%;
        }

        h1 {
            font-size: 1.8rem; 
            color: #4a4a4a;
            margin: 0 0 5px 0;
            text-transform: uppercase;
            letter-spacing: 6px;
            text-align: center;
            font-family: 'Syncopate', sans-serif;
        }

        #countdown-display { font-size: 2.4rem; font-weight: bold; text-align: center; }
        .unit { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #666; margin-right: 10px; }
        span { color: #000; border-bottom: 2px solid #2c2c2c; padding: 0 5px; }

        #celebration {
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
        }

        #celebration h2 {
            font-size: 3rem; 
            font-family: 'Syncopate', sans-serif;
            text-transform: uppercase;
            letter-spacing: 10px;
            text-align: center;
            margin-top: 5vh; 
            background: linear-gradient(90deg, #4a4a4a, #ff6b6b, #ffcc33, #4a4a4a);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.9));
        }

        @keyframes shine { to { background-position: 200% center; } }

       .video-wrapper {
            position: absolute;
            top: 48%;         /* Adjust these as we did before */
            left: 49%;          
            width: 30%;       /* Slightly wider to cover the edges */
            height: 43%;      
    
            transform: translate(-50%, -50%); 
            z-index: 10;
            overflow: hidden;

        iframe { width: 100%; height: 100%; border: none; }
        }
        #fullscreen-btn {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(44, 44, 44, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.6rem;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(3px);
            z-index: 100;
        }

        @media screen and (orientation: portrait) {
            body::after {
                content: "Please rotate your phone to Landscape";
                position: absolute;
                background: #f5f5dc;
                top: 0; left: 0; right: 0; bottom: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                color: #2c2c2c;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="countdown-section">
        <h1>Counting down...</h1>
        <div id="countdown-display">
            <span id="days">00</span><span class="unit">Days</span> 
            <span id="hours">00</span><span class="unit">Hours</span> 
            <span id="minutes">00</span><span class="unit">Minutes</span> 
            <span id="seconds">00</span><span class="unit">Seconds</span>
        </div>
    </div>

    <div id="celebration">
        <h2>Happy Birthday!</h2>
        <div class="video-wrapper" id="yt-player-container">
            </div>
    </div>

    <button id="fullscreen-btn" onclick="toggleFullscreen()">Maximize</button>

    <script>
        const YOUTUBE_VIDEO_ID = 'HdEaxE4dHow';
        const birthdayDate = new Date("2026-01-10T00:00:00").getTime();

        const preLoadImg = new Image();
        preLoadImg.src = "download.jpg";

        function toggleFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const docEl = document.documentElement;
            if(!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                btn.innerHTML = "Minimize";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerHTML = "Maximize";
            }
        }

        function launchConfetti() {
            var duration = 5 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const distance = birthdayDate - now;

            if (distance < 0) {
                clearInterval(timer);
                document.body.style.backgroundImage = "url('download.jpg')";
                document.getElementById("countdown-section").style.display = "none";
                document.getElementById("celebration").style.display = "flex";
                
                // FIXED: This line actually puts the video into your container
                document.getElementById("yt-player-container").innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?autoplay=1&mute=0" 
                    allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
                
                launchConfetti(); 
                return;
            }

            const days = Math.floor(distance / 86400000);
            const hours = Math.floor((distance % 86400000) / 3600000);
            const minutes = Math.floor((distance % 3600000) / 60000);
            const seconds = Math.floor((distance % 60000) / 1000);

            document.getElementById("days").innerHTML = (days < 10 ? "0"+days : days);
            document.getElementById("hours").innerHTML = (hours < 10 ? "0"+hours : hours);
            document.getElementById("minutes").innerHTML = (minutes < 10 ? "0"+minutes : minutes);
            document.getElementById("seconds").innerHTML = (seconds < 10 ? "0"+seconds : seconds);
        }, 1000);
    </script>
</body>
</html>
