<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise - Part 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('bglockk.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f5f5dc;
            color: #2c2c2c;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; 
            transition: background 0.8s ease-in-out, background-color 0.8s ease-in-out;
        }

        /* --- PASSWORD SCREEN --- */
        #lock-screen {
            text-align: center;
            z-index: 100;
            padding: 50px;
            background: transparent;
            border: none;
            box-shadow: none;
            max-width: 400px;
            width: 90%;
            margin-top: 15vh;
        }

        #lock-screen h2 {
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: #FFFFFF;
        }

        #pass-input {
            padding: 15px;
            border: 2px solid #2c2c2c;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            text-align: center;
            width: 80%;
            outline: none;
        }

        #unlock-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: #2c2c2c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* --- SCROLLING CONTENT --- */
        #secret-content {
            display: none;
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        .scroll-container {
            display: flex;
            justify-content: center;
            padding: 80px 20px;
            gap: 40px;
        }

        .photo-column {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding-top: 100px;
        }

        .photo-column img {
            width: 100%;
            border: 8px solid white;
            border-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .letter-column {
            flex: 1;
            max-width: 700px;
        }

        .letter-paper {
            background: white;
            padding: 60px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.05);
            min-height: 1200px; 
            border-radius: 2px;
        }

        /* --- BUTTON CONTROLS (Bottom Right) --- */
        .controls-group {
            position: fixed;
            bottom: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        #back-btn, #fullscreen-btn {
            background: rgba(44, 44, 44, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.6rem;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(3px);
            font-family: 'Montserrat', sans-serif;
        }

        #back-btn {
            display: none; /* Hidden until unlocked */
        }

        @media (max-width: 900px) {
            .photo-column { display: none; } 
            .letter-paper { padding: 35px; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>Private Access</h2>
        <input type="password" id="pass-input" placeholder="Enter Secret Code">
        <br>
        <button id="unlock-btn" onclick="checkPassword()">Unlock</button>
        <p id="error-msg" style="display:none; color:#ff6b6b; margin-top:15px;">Incorrect key.</p>
    </div>

    <div id="secret-content">
        <div class="scroll-container">
            <div class="photo-column">
                <img src="photo1.jpg" style="transform: rotate(-3deg);">
                <img src="photo2.jpg" style="transform: rotate(2deg);">
                <img src="photo3.jpg" style="transform: rotate(-1deg);">
                <img src="photo4.jpg" style="transform: rotate(4deg);">
            </div>

            <div class="letter-column">
                <div class="letter-paper">
                    <h1>Dearest Friend,</h1>
                    <p>Welcome to the final surprise. [Type your message here!]</p>
                    <div style="margin-top:60px; font-weight:bold;">Stay confused,<br>Arjun</div>
                </div>
            </div>

            <div class="photo-column">
                <img src="photo5.jpg" style="transform: rotate(3deg);">
                <img src="photo6.jpg" style="transform: rotate(-2deg);">
                <img src="photo7.jpg" style="transform: rotate(1deg);">
                <img src="photo8.jpg" style="transform: rotate(-4deg);">
            </div>
        </div>
    </div>

    <div class="controls-group">
        <button id="back-btn" onclick="goBack()">Back to TV</button>
        <button id="fullscreen-btn" onclick="toggleFullscreen()">Maximize</button>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            const secretKey = "YmlydGhkYXkyMDI2"; 

            if (btoa(input) === secretKey) {
                document.getElementById('lock-screen').style.display = 'none';
                document.body.style.backgroundImage = "none";
                document.body.style.backgroundColor = "#fdfaf0"; 
                
                const content = document.getElementById('secret-content');
                content.style.display = 'block';
                setTimeout(() => { content.style.opacity = '1'; }, 50);
                
                document.getElementById('back-btn').style.display = 'block';
                document.body.style.overflow = "auto";
                document.body.style.display = "block"; 
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        function goBack() {
            window.location.href = "index.html";
        }

        function toggleFullscreen() {
            const btn = document.getElementById('fullscreen-btn');
            const docEl = document.documentElement;
            if(!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (docEl.requestFullscreen) docEl.requestFullscreen();
                else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
                btn.innerHTML = "Minimize";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerHTML = "Maximize";
            }
        }

        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkPassword(); }
        });
    </script>
</body>
</html>
